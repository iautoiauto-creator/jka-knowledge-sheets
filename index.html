<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JKA 経営企画部 知見継承データベース</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--black:#111;--gold:#a8862e;--gold-light:#c9a851;--gold-pale:#f5edd8;--line:#d9d5cc;--text:#222;--text-sub:#666055;--bg:#f7f6f3;--white:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans JP","Yu Gothic",sans-serif;line-height:1.7}
.sys-header{background:var(--black);color:#fff;padding:16px 32px;display:flex;align-items:center;gap:14px}
.sys-logo{width:44px;height:44px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:900;font-size:13px;font-style:italic}
.sys-title{font-weight:700;font-size:16px}
.sys-title small{display:block;font-weight:400;font-size:9.5px;color:var(--gold-light);letter-spacing:.22em;margin-top:1px}
.wrap{max-width:820px;margin:0 auto;padding:40px 32px 80px}
h1{font-size:22px;font-weight:900;border-left:5px solid var(--gold);padding-left:16px;margin-bottom:8px}
.lead{color:var(--text-sub);font-size:13px;margin-bottom:32px}
a.card{display:block;text-decoration:none;color:inherit;background:var(--white);border:1px solid var(--line);border-left:4px solid var(--gold);padding:18px 22px;margin-bottom:16px;transition:.15s}
a.card:hover{background:var(--gold-pale);transform:translateX(3px)}
a.card .tag{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.1em}
a.card .name{font-size:16px;font-weight:700;margin-top:4px}
a.card .desc{font-size:12.5px;color:var(--text-sub);margin-top:4px}
.foot{margin-top:40px;font-size:11px;color:var(--text-sub);border-top:1px solid var(--line);padding-top:16px}
</style>
</head>
<body>
<div class="sys-header">
  <div class="sys-logo">JKA</div>
  <div class="sys-title">経営企画部 知見継承データベース<small>KEIEI-KIKAKU KNOWLEDGE TRANSFER DATABASE</small></div>
</div>
<div class="wrap">
  <h1>知見継承シート 一覧</h1>
  <p class="lead">業務知見シートの入力フォームと、生成済みの閲覧用シートを公開しています。</p>

  <a class="card" href="./知見継承シート_入力フォーム.html">
    <div class="tag">FORM ／ 入力フォーム</div>
    <div class="name">業務知見シート 入力フォーム</div>
    <div class="desc">新規シートの作成・既存シートの上書き編集。入力後に閲覧用HTMLを自動生成できます。</div>
  </a>

  <a class="card" href="./知見継承シート_01_競の会.html">
    <div class="tag">CASE 01 ／ 閲覧用シート</div>
    <div class="name">競の会（公営競技会長懇）事前踏対応</div>
    <div class="desc">第143回・2024年11月分の知見継承シート（閲覧用）。</div>
  </a>

  <div class="foot">JKA 経営企画部 知見継承データベース ／ GitHub Pages で公開</div>
</div>
</body>
</html>
